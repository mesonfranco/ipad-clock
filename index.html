<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  padding: 30px;

  /* 🌈 fondo moderno */
  background: linear-gradient(135deg, #667eea, #764ba2, #ff7eb3);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;

  color: #ffffff;
}

/* animación fondo */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* reloj */
.clock {
  font-size: 90px;
  font-weight: 300;
}

/* fecha */
.date {
  font-size: 20px;
  opacity: 0.8;
  margin-bottom: 20px;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* 🧊 glass cards */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* título */
.title {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 8px;
}

/* valor */
.value {
  font-size: 22px;
  font-weight: 500;
}

/* radar */
.radar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  position: relative;
  overflow: hidden;
}

.sweep {
  position: absolute;
  width: 100%;
  height: 100%;
  background: conic-gradient(rgba(255,255,255,0.3), transparent 60%);
  animation: spin 3s linear infinite;
}

.ball {
  width: 8px;
  height: 8px;
  background: #ffcc00;
  border-radius: 50%;
  position: absolute;
}

/* matrix canvas */
#matrix {
  width: 100%;
  height: 150px;
  border-radius: 10px;
  background: rgba(0,0,0,0.5);
}

/* animación */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="grid">

  <div class="card">
    <div class="title">Clima</div>
    <div class="value" id="weather">--</div>
  </div>

  <div class="card">
    <div class="title">Ubicación</div>
    <div class="value" id="city">--</div>
  </div>

  <div class="card">
    <div class="title">Estado</div>
    <div class="value" id="status">--</div>
  </div>

  <div class="card">
    <div class="title">Frase</div>
    <div class="value" id="quote"></div>
  </div>

  <div class="card" id="radarCard">
    <div class="title">Radar DBZ</div>
    <div class="radar" id="radar">
      <div class="sweep"></div>
    </div>
  </div>

  <div class="card">
    <div class="title">Matrix</div>
    <canvas id="matrix"></canvas>
  </div>

</div>

<script>

// CLOCK
function updateClock() {
  var now = new Date();
  var h = ("0" + now.getHours()).slice(-2);
  var m = ("0" + now.getMinutes()).slice(-2);

  document.getElementById("clock").innerHTML = h + ":" + m;

  document.getElementById("date").innerHTML =
    now.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

  var estado =
    h < 6 ? "Noche 🌙" :
    h < 12 ? "Mañana ☀️" :
    h < 19 ? "Tarde 🌤" :
    "Noche 🌙";

  document.getElementById("status").innerHTML = estado;
}

setInterval(updateClock, 60000);
updateClock();


// GEO + CLIMA
navigator.geolocation.getCurrentPosition(function(pos) {
  var lat = pos.coords.latitude;
  var lon = pos.coords.longitude;

  fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current_weather=true")
    .then(r=>r.json())
    .then(d=> document.getElementById("weather").innerHTML = d.current_weather.temperature + "°C");

  fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon)
    .then(r=>r.json())
    .then(d=> document.getElementById("city").innerHTML = d.address.city || d.address.town);
});


// FRASES
var quotes = [
  "Sigue avanzando",
  "Menos excusas, más acción",
  "El progreso es diario",
  "Hoy es tu oportunidad"
];
document.getElementById("quote").innerHTML =
  quotes[Math.floor(Math.random()*quotes.length)];


// RADAR
var radar = document.getElementById("radar");
var balls = [];

for (var i=0;i<7;i++){
  var b = document.createElement("div");
  b.className = "ball";
  radar.appendChild(b);
  balls.push({el:b, x:Math.random()*130, y:Math.random()*130});
}

setInterval(function(){
  balls.forEach(function(b){
    b.x += (Math.random()-0.5)*8;
    b.y += (Math.random()-0.5)*8;

    b.x = Math.max(0, Math.min(130, b.x));
    b.y = Math.max(0, Math.min(130, b.y));

    b.el.style.left = b.x + "px";
    b.el.style.top = b.y + "px";
  });
}, 500);


// MATRIX
var c = document.getElementById("matrix");
var ctx = c.getContext("2d");
c.width = c.offsetWidth;
c.height = 150;

var letters = "francoezequiel";
var drops = [];

for (var i = 0; i < Math.floor(c.width/14); i++) {
  drops[i] = 1;
}

setInterval(function(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffcc";
  ctx.font="14px monospace";

  for(var i=0;i<drops.length;i++){
    var text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*14,drops[i]*14);

    if(drops[i]*14>c.height && Math.random()>0.95) drops[i]=0;
    drops[i]++;
  }
},50);

</script>

</body>
</html>
