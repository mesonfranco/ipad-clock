<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Dashboard</title>

<style>

body {
  margin: 0;
  background: #0a0a0a;
  color: #00ff9f;
  font-family: "Courier New", monospace;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  padding: 40px;
}

/* ⏰ CLOCK */
.clock {
  font-size: 100px;
  color: #00ff9f;
}

/* DATE */
.date {
  font-size: 20px;
  opacity: 0.7;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* 🧊 CARDS */
.card {
  background: rgba(0,255,159,0.05);
  border: 1px solid rgba(0,255,159,0.2);
  border-radius: 10px;
  padding: 20px;
}

/* TITLES */
.title {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 10px;
}

/* VALUES */
.value {
  font-size: 20px;
}

/* 💿 TOCADISCOS */
.player {
  display: flex;
  align-items: center;
  gap: 20px;
}

/* DISCO */
.vinyl {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, #111 40%, #000 60%);
  border: 3px solid #00ff9f;
  animation: spin 3s linear infinite;
}

/* CENTRO DEL DISCO */
.vinyl::after {
  content: "";
  width: 12px;
  height: 12px;
  background: #00ff9f;
  border-radius: 50%;
  position: absolute;
  margin: 34px;
}

/* BRAZO */
.arm {
  width: 40px;
  height: 4px;
  background: #00ff9f;
  transform: rotate(25deg);
}

/* ANIMACIÓN */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="clock" id="clock">--:--</div>
<div class="date" id="date"></div>

<div class="grid">

  <div class="card">
    <div class="title">Clima</div>
    <div class="value" id="weather">--</div>
  </div>

  <div class="card">
    <div class="title">Ubicación</div>
    <div class="value" id="city">--</div>
  </div>

  <div class="card">
    <div class="title">Estado del día</div>
    <div class="value" id="status">--</div>
  </div>

  <div class="card">
    <div class="title">Frase</div>
    <div class="value" id="quote">--</div>
  </div>

  <div class="card">
    <div class="title">Música</div>
    <div class="player">
      <div class="vinyl"></div>
      <div class="arm"></div>
    </div>
    <audio id="music" autoplay loop>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="card">
    <div class="title">Boca Juniors</div>
    <div class="value" id="boca">Cargando...</div>
  </div>

</div>

<script>

// ⏰ CLOCK
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  document.getElementById("clock").innerHTML = h + ":" + m;

  document.getElementById("date").innerHTML =
    now.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

  var status = "Noche 🌙";
  if (h >= 6 && h < 12) status = "Mañana ☀️";
  else if (h >= 12 && h < 19) status = "Tarde 🌤";

  document.getElementById("status").innerHTML = status;
}

setInterval(updateClock, 60000);
updateClock();


// 📍 GEO + CLIMA
navigator.geolocation.getCurrentPosition(function(pos) {
  var lat = pos.coords.latitude;
  var lon = pos.coords.longitude;

  fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current_weather=true")
    .then(r => r.json())
    .then(data => {
      document.getElementById("weather").innerHTML =
        data.current_weather.temperature + "°C";
    });

  fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon)
    .then(r => r.json())
    .then(data => {
      document.getElementById("city").innerHTML =
        data.address.city || data.address.town;
    });

});


// 🧠 FRASES
var quotes = [
  "Disciplina > motivación",
  "Menos distracciones, más foco",
  "Hoy haces tu futuro",
  "Modo enfoque activado",
  "Hacelo aunque no tengas ganas"
];

document.getElementById("quote").innerHTML =
  quotes[Math.floor(Math.random() * quotes.length)];


// ⚽ BOCA
var lastMatch = "vs Universidad Católica (2-1) 🔥";
var nextMatch = "vs Independiente - 11/04 19:30";

document.getElementById("boca").innerHTML =
  "Último: " + lastMatch + "<br><br>" +
  "Próximo: " + nextMatch;


// 🎵 FIX autoplay en iPad (requiere interacción)
document.body.addEventListener("click", function() {
  document.getElementById("music").play();
});

</script>

</body>
</html>
