<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimal Dashboard</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #e0f7f7;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  padding: 40px;
}

.clock {
  font-size: 120px;
  font-weight: 200;
}

.date {
  font-size: 22px;
  opacity: 0.6;
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.03);
  border-radius: 15px;
  padding: 20px;
}

.title {
  font-size: 14px;
  opacity: 0.5;
  margin-bottom: 10px;
}

.value {
  font-size: 24px;
}

#mapFallback {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="clock" id="clock">--:--</div>
<div class="date" id="date"></div>

<div class="grid">

  <div class="card">
    <div class="title">Clima</div>
    <div class="value" id="weather">--</div>
  </div>

  <div class="card">
    <div class="title">Ubicación</div>
    <div class="value" id="city">--</div>
  </div>

  <div class="card">
    <div class="title">Estado del día</div>
    <div class="value" id="status">--</div>
  </div>

  <div class="card">
    <div class="title">Frase</div>
    <div class="value" id="quote">--</div>
  </div>

  <div class="card">
    <div class="title">Tráfico</div>
    <iframe id="map"
      width="100%"
      height="150"
      style="border-radius:10px;border:0;background:#111;">
    </iframe>
    <div id="mapFallback">Tocá para abrir mapa</div>
  </div>

  <div class="card">
    <div class="title">Boca Juniors</div>
    <div class="value" id="boca">Cargando...</div>
  </div>

</div>

<script>

// ⏰ CLOCK + STATUS
function updateClock() {
  var now = new Date();

  var h = now.getHours();
  var m = now.getMinutes();

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  document.getElementById("clock").innerHTML = h + ":" + m;

  document.getElementById("date").innerHTML =
    now.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

  var status = "Noche 🌙";
  if (h >= 6 && h < 12) status = "Mañana ☀️";
  else if (h >= 12 && h < 19) status = "Tarde 🌤";

  document.getElementById("status").innerHTML = status;
}

setInterval(updateClock, 1000);
updateClock();


// 📍 GEO + CLIMA + MAPA (FIX iPad)
navigator.geolocation.getCurrentPosition(function(pos) {
  var lat = pos.coords.latitude;
  var lon = pos.coords.longitude;

  // 🌡️ CLIMA
  fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current_weather=true")
    .then(r => r.json())
    .then(data => {
      document.getElementById("weather").innerHTML =
        data.current_weather.temperature + "°C";
    });

  // 📍 CIUDAD
  fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon)
    .then(r => r.json())
    .then(data => {
      document.getElementById("city").innerHTML =
        data.address.city || data.address.town;
    });

  // 🗺️ MAPA (delay fix Safari)
  var map = document.getElementById("map");

  setTimeout(function() {
    map.src = "https://maps.google.com/maps?q=" + lat + "," + lon + "&z=14&output=embed";
  }, 500);

  // 👉 abrir tráfico real
  var openMap = function() {
    window.open("https://www.google.com/maps/@"+lat+","+lon+",14z/data=!5m1!1e1");
  };

  map.onclick = openMap;
  document.getElementById("mapFallback").onclick = openMap;

}, function() {
  document.getElementById("mapFallback").innerHTML = "Permitir ubicación";
});


// 🧠 FRASES
var quotes = [
  "Disciplina > motivación",
  "Progreso constante",
  "Menos distracciones, más foco",
  "Hoy haces tu futuro",
  "Hacelo aunque no tengas ganas",
  "El éxito es consistencia diaria",
  "Menos excusas, más acción"
];

document.getElementById("quote").innerHTML =
  quotes[Math.floor(Math.random() * quotes.length)];


// ⚽ BOCA INFO 💙💛
var lastMatch = "vs Universidad Católica (2-1) ✅";
var nextMatch = "vs Independiente - 11/04 19:30";

document.getElementById("boca").innerHTML =
  "Último: " + lastMatch + "<br><br>" +
  "Próximo: " + nextMatch;

</script>

</body>
</html>
