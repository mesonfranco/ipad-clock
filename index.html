<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Dashboard</title>

<style>

body {
  margin: 0;
  background: #050505;
  color: #00ff9f;
  font-family: "Courier New", monospace;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  padding: 40px;
}

/* CLOCK */
.clock { font-size: 100px; }

/* DATE */
.date { font-size: 20px; opacity: 0.7; margin-bottom: 30px; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARDS */
.card {
  background: rgba(0,255,159,0.05);
  border: 1px solid rgba(0,255,159,0.2);
  border-radius: 10px;
  padding: 20px;
  transition: 0.3s;
}

.alert {
  border-color: red !important;
  box-shadow: 0 0 10px red;
}

.title { font-size: 12px; opacity: 0.6; margin-bottom: 10px; }
.value { font-size: 20px; }

/* RADAR */
.radar {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 2px solid #00ff9f;
  position: relative;
  overflow: hidden;
}

/* sweep */
.sweep {
  position: absolute;
  width: 100%;
  height: 100%;
  background: conic-gradient(rgba(0,255,159,0.3), transparent 60%);
  border-radius: 50%;
  animation: spin 3s linear infinite;
}

/* esfera */
.ball {
  width: 8px;
  height: 8px;
  background: orange;
  border-radius: 50%;
  position: absolute;
}

/* animación radar */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* MATRIX */
#matrix {
  width: 100%;
  height: 150px;
  background: black;
  border-radius: 10px;
}

/* CRT */
.crt {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: repeating-linear-gradient(
    rgba(0,0,0,0.2) 0px,
    rgba(0,0,0,0.2) 2px,
    transparent 2px,
    transparent 4px
  );
  opacity: 0.2;
}

</style>
</head>

<body>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="grid">

  <div class="card">
    <div class="title">Clima</div>
    <div class="value" id="weather">--</div>
  </div>

  <div class="card">
    <div class="title">Ubicación</div>
    <div class="value" id="city">--</div>
  </div>

  <div class="card">
    <div class="title">Estado</div>
    <div class="value" id="status">--</div>
  </div>

  <div class="card">
    <div class="title">Frase</div>
    <div class="value" id="quote"></div>
  </div>

  <div class="card" id="radarCard">
    <div class="title">Radar DBZ</div>
    <div class="radar" id="radar">
      <div class="sweep"></div>
    </div>
  </div>

  <div class="card">
    <div class="title">Matrix</div>
    <canvas id="matrix"></canvas>
  </div>

</div>

<div class="crt"></div>

<script>

// CLOCK
function updateClock() {
  var now = new Date();
  var h = ("0" + now.getHours()).slice(-2);
  var m = ("0" + now.getMinutes()).slice(-2);

  clock.innerHTML = h + ":" + m;

  date.innerHTML = now.toLocaleDateString("es-ES", {
    weekday: "long", day: "numeric", month: "long"
  });

  status.innerHTML =
    h < 6 ? "Noche 🌙" :
    h < 12 ? "Mañana ☀️" :
    h < 19 ? "Tarde 🌤" : "Noche 🌙";
}

setInterval(updateClock, 60000);
updateClock();

// GEO + CLIMA
navigator.geolocation.getCurrentPosition(function(pos) {
  var lat = pos.coords.latitude;
  var lon = pos.coords.longitude;

  fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current_weather=true")
    .then(r=>r.json())
    .then(d=> weather.innerHTML = d.current_weather.temperature + "°C");

  fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon)
    .then(r=>r.json())
    .then(d=> city.innerHTML = d.address.city || d.address.town);
});

// FRASES
var quotes = [
  "Más allá del límite",
  "Entrena como un Saiyajin",
  "Nunca te rindas",
  "El poder crece en la adversidad"
];
quote.innerHTML = quotes[Math.floor(Math.random()*quotes.length)];


// 🟠 RADAR DBZ DINÁMICO
var radar = document.getElementById("radar");
var balls = [];

for (var i=0;i<7;i++){
  var b = document.createElement("div");
  b.className = "ball";
  radar.appendChild(b);
  balls.push({el:b, x:Math.random()*140, y:Math.random()*140});
}

// movimiento
setInterval(function(){
  balls.forEach(function(b){
    b.x += (Math.random()-0.5)*10;
    b.y += (Math.random()-0.5)*10;

    b.x = Math.max(0, Math.min(140, b.x));
    b.y = Math.max(0, Math.min(140, b.y));

    b.el.style.left = b.x + "px";
    b.el.style.top = b.y + "px";
  });
}, 500);

// 🚨 ALERTA
setInterval(function(){
  if (Math.random() > 0.7) {
    document.getElementById("radarCard").classList.add("alert");
    beep();
    setTimeout(()=> radarCard.classList.remove("alert"), 1000);
  }
}, 3000);

// 🔊 SONIDO (beep simple)
function beep(){
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=> osc.stop(), 100);
}

// MATRIX
var c = document.getElementById("matrix");
var ctx = c.getContext("2d");
c.width = c.offsetWidth;
c.height = 150;

var letters = "francoezequiel";
var drops = Array(Math.floor(c.width/14)).fill(1);

setInterval(function(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ff9f";
  ctx.font="14px monospace";

  for(var i=0;i<drops.length;i++){
    var text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*14,drops[i]*14);

    if(drops[i]*14>c.height && Math.random()>0.95) drops[i]=0;
    drops[i]++;
  }
},50);

</script>

</body>
</html>
