<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Radar Dashboard</title>

<style>

body {
  margin: 0;
  background: #050505;
  color: #00ff9f;
  font-family: "Courier New", monospace;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  padding: 40px;
}

/* ⏰ CLOCK */
.clock {
  font-size: 100px;
}

/* DATE */
.date {
  font-size: 20px;
  opacity: 0.7;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARDS */
.card {
  background: rgba(0,255,159,0.05);
  border: 1px solid rgba(0,255,159,0.2);
  border-radius: 10px;
  padding: 20px;
}

/* TITLES */
.title {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 10px;
}

/* VALUES */
.value {
  font-size: 20px;
}

/* 🟢 RADAR */
.radar {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 2px solid #00ff9f;
  position: relative;
  overflow: hidden;
}

/* líneas radar */
.radar::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 2px;
  background: rgba(0,255,159,0.3);
  top: 50%;
}

.radar::after {
  content: "";
  position: absolute;
  height: 100%;
  width: 2px;
  background: rgba(0,255,159,0.3);
  left: 50%;
}

/* barrido */
.sweep {
  position: absolute;
  width: 100%;
  height: 100%;
  background: conic-gradient(rgba(0,255,159,0.3), transparent 60%);
  border-radius: 50%;
  animation: spin 3s linear infinite;
}

/* puntos (esferas) */
.dot {
  width: 6px;
  height: 6px;
  background: #00ff9f;
  border-radius: 50%;
  position: absolute;
}

/* posiciones random */
.dot1 { top: 30%; left: 60%; }
.dot2 { top: 70%; left: 40%; }
.dot3 { top: 50%; left: 80%; }

/* animación radar */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 📺 EFECTO CRT */
.crt {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: repeating-linear-gradient(
    rgba(0,0,0,0.2) 0px,
    rgba(0,0,0,0.2) 2px,
    transparent 2px,
    transparent 4px
  );
  opacity: 0.2;
}

</style>
</head>

<body>

<div class="clock" id="clock">--:--</div>
<div class="date" id="date"></div>

<div class="grid">

  <div class="card">
    <div class="title">Clima</div>
    <div class="value" id="weather">--</div>
  </div>

  <div class="card">
    <div class="title">Ubicación</div>
    <div class="value" id="city">--</div>
  </div>

  <div class="card">
    <div class="title">Estado del día</div>
    <div class="value" id="status">--</div>
  </div>

  <div class="card">
    <div class="title">Frase</div>
    <div class="value" id="quote">--</div>
  </div>

  <div class="card">
    <div class="title">Radar DBZ</div>
    <div class="radar">
      <div class="sweep"></div>
      <div class="dot dot1"></div>
      <div class="dot dot2"></div>
      <div class="dot dot3"></div>
    </div>
  </div>

  <div class="card">
    <div class="title">Sistema</div>
    <div class="value" id="system">OK</div>
  </div>

</div>

<div class="crt"></div>

<script>

// ⏰ CLOCK
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  document.getElementById("clock").innerHTML = h + ":" + m;

  document.getElementById("date").innerHTML =
    now.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

  var status = "Noche 🌙";
  if (h >= 6 && h < 12) status = "Mañana ☀️";
  else if (h >= 12 && h < 19) status = "Tarde 🌤";

  document.getElementById("status").innerHTML = status;
}

setInterval(updateClock, 60000);
updateClock();


// 📍 GEO + CLIMA
navigator.geolocation.getCurrentPosition(function(pos) {
  var lat = pos.coords.latitude;
  var lon = pos.coords.longitude;

  fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current_weather=true")
    .then(r => r.json())
    .then(data => {
      document.getElementById("weather").innerHTML =
        data.current_weather.temperature + "°C";
    });

  fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon)
    .then(r => r.json())
    .then(data => {
      document.getElementById("city").innerHTML =
        data.address.city || data.address.town;
    });

});


// 🧠 FRASES
var quotes = [
  "Modo entrenamiento activado",
  "El poder viene de la disciplina",
  "Nunca subestimes tu potencial",
  "Sigue entrenando",
  "Más allá del límite"
];

document.getElementById("quote").innerHTML =
  quotes[Math.floor(Math.random() * quotes.length)];

</script>

</body>
</html>
