<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimal Dashboard</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #e0f7f7;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  padding: 40px;
  transition: background 0.5s;
}

/* CLOCK */
.clock {
  font-size: 120px;
  font-weight: 200;
  letter-spacing: 5px;
}

/* DATE */
.date {
  font-size: 22px;
  opacity: 0.6;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.03);
  border-radius: 15px;
  padding: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  background: rgba(255,255,255,0.05);
}

.title {
  font-size: 14px;
  opacity: 0.5;
  margin-bottom: 10px;
}

.value {
  font-size: 28px;
}

/* FADE */
.fade {
  animation: fade 1s ease;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="clock" id="clock">--:--</div>
<div class="date" id="date"></div>

<div class="grid">

  <div class="card">
    <div class="title">Clima</div>
    <div class="value" id="weather">Cargando...</div>
  </div>

  <div class="card">
    <div class="title">Ubicación</div>
    <div class="value" id="city">--</div>
  </div>

  <div class="card">
    <div class="title">Estado del día</div>
    <div class="value" id="status"></div>
  </div>

  <div class="card">
    <div class="title">Frase</div>
    <div class="value" id="quote"></div>
  </div>

</div>

<script>

// CLOCK
function updateClock() {
  var now = new Date();

  var h = now.getHours();
  var m = now.getMinutes();

  if (h < 10) h = "0" + h;
  if (m < 10) m = "0" + m;

  document.getElementById("clock").innerHTML = h + ":" + m;

  document.getElementById("date").innerHTML =
    now.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

  // estado del día
  var status = "Noche";
  if (h >= 6 && h < 12) status = "Mañana ☀️";
  else if (h >= 12 && h < 19) status = "Tarde 🌤";
  else status = "Noche 🌙";

  document.getElementById("status").innerHTML = status;
}

setInterval(updateClock, 1000);
updateClock();


// CLIMA + UBICACIÓN
navigator.geolocation.getCurrentPosition(function(pos) {
  var lat = pos.coords.latitude;
  var lon = pos.coords.longitude;

  fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current_weather=true")
    .then(r => r.json())
    .then(data => {
      document.getElementById("weather").innerHTML =
        data.current_weather.temperature + "°C";
    });

  fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon)
    .then(r => r.json())
    .then(data => {
      document.getElementById("city").innerHTML =
        data.address.city || data.address.town;
    });
});


// FRASES
var quotes = [
  "Disciplina > motivación",
  "Lo que haces hoy define tu futuro",
  "Menos distracciones, más foco",
  "Progreso > perfección",
  "Hazlo aunque no tengas ganas"
];

document.getElementById("quote").innerHTML =
  quotes[Math.floor(Math.random() * quotes.length)];

</script>

</body>
</html>
